<div
  appHighlight="yellow"
  [ngClass]="cardClasses"
  [ngStyle]="borderStyle">

  <h3>{{ course.name }}</h3>

  <p>ID: {{ course.id }}</p>
  <p>Code: {{ course.code }}</p>
  <p>{{ course.credits | creditLabel }}</p>

  <div [ngSwitch]="course.gradeStatus">

    <p *ngSwitchCase="'passed'">
      Passed
    </p>

    <p *ngSwitchCase="'failed'">
      Failed
    </p>

    <p *ngSwitchDefault>
      Pending
    </p>

  

  <button (click)="enrollRequested.emit(course.id)">
    Enroll
  </button>

  <button (click)="toggleDetails()">
    {{ isExpanded ? 'Hide Details' : 'Show Details' }}
  </button>
</div>
</div>
