<section class="profile-page">
  <h2>{{ studentName }}</h2>
  <p>GPA: {{ gpa }}</p>

  <h3>Enrolled Courses</h3>
  <ul>
    <li *ngFor="let course of enrolledCourses$ | async">
      {{ course.name }} ({{ course.code }})
    </li>
  </ul>
  <p *ngIf="(enrolledCourses$ | async)?.length === 0">No courses enrolled yet.</p>
</section>
